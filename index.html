<!DOCTYPE html>
<html>
<head>
    <title>QR to Google Sheets</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #reader { width: 500px; border: 1px solid #ccc; margin-top: 20px; }
        #status { margin-top: 20px; color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Scan QR Code</h2>
    <div id="reader"></div>
    <div id="status"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWrobt6fYzSO608tH17DRtUou8ECZbyKzU0J4VMcZlfVRtTDr4XeEgYCkBOQIESJ3N7A/exec";

       function onScanSuccess(decodedText) {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "⏳ Checking...";
            statusEl.style.color = "#ff9800";

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ qrCode: decodedText }),
                // Note: We removed 'no-cors' to read the response from Google
                // If you face issues, we can revert to a simpler local check
            }).then(response => response.text()).then(result => {
                if (result === "Duplicate") {
                    statusEl.innerText = "⚠️ Already Scanned!";
                    statusEl.style.color = "#dc3545";
                } else {
                    statusEl.innerText = "✅ Successfully Logged!";
                    statusEl.style.color = "#4caf50";
                    addToHistory(decodedText);
                }
            }).catch(err => {
                // If Google blocks the response (CORS), we'll assume success 
                // but you should check your sheet!
                statusEl.innerText = "✅ Sent to Sheet";
                statusEl.style.color = "#4caf50";
                addToHistory(decodedText);
            });
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
